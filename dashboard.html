<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1f2937;
padding:40px;
border-radius:15px;
text-align:center;
width:380px;
}

h1{
margin-bottom:20px;
}

p{
margin-bottom:20px;
font-size:18px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="box">
<h1>Welcome</h1>
<p id="userEmail">Loading...</p>
<button onclick="logoutUser()">Logout</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://bvjapzjafkptwbzfjcaf.supabase.co";
const supabaseKey = "sb_publishable_dBx-7wdsVokX7hc8r45XNQ_FnmCCFqV";

const supabase = createClient(supabaseUrl, supabaseKey);

async function checkUser(){
const { data } = await supabase.auth.getUser();

if(data.user){
document.getElementById("userEmail").innerText = data.user.email;
}else{
window.location.href = "index.html";
}
}

window.logoutUser = async () => {
await supabase.auth.signOut();
window.location.href = "index.html";
};

checkUser();
</script>

</body>
</html>
