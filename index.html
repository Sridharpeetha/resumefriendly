<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Resume Friendly</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.container{
background:#fff;
padding:30px;
border-radius:14px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
font-size:16px;
}
input{border:1px solid #ccc;}
button{
border:none;
cursor:pointer;
font-weight:bold;
}
.signup{background:#2563eb;color:#fff;}
.login{background:#16a34a;color:#fff;}
.google{background:#ea4335;color:#fff;}
#msg{
margin-top:12px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>Resume Friendly</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="signup" onclick="signupUser()">Sign Up</button>
<button class="login" onclick="loginUser()">Login</button>
<button class="google" onclick="googleLogin()">Google Login</button>

<div id="msg"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
'https://bvjapzjafkptwbzfjcaf.supabase.co',
'YOUR_PUBLISHABLE_KEY'
);

const msg = document.getElementById("msg");

function show(text,color="red"){
msg.innerText=text;
msg.style.color=color;
}

window.signupUser = async ()=>{
const email=email.value;
const password=password.value;

const { error } = await supabase.auth.signUp({email,password});

if(error) show(error.message);
else show("Signup success. Check email.","green");
};

window.loginUser = async ()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({email,password});

if(error) show(error.message);
else location.href="dashboard.html";
};

window.googleLogin = async ()=>{
await supabase.auth.signInWithOAuth({
provider:"google",
options:{redirectTo: location.origin + "/dashboard.html"}
});
};
</script>

</body>
</html>
