<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Friendly - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.signup{
background:#2563eb;
color:white;
}

.login{
background:#16a34a;
color:white;
}

.google{
background:#ea4335;
color:white;
}

button:hover{
opacity:.9;
}

.msg{
margin-top:12px;
text-align:center;
font-size:14px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}
</style>
</head>
<body>

<div class="container">
<h1>Resume Friendly</h1>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button class="signup" onclick="signupUser()">Sign Up</button>
<button class="login" onclick="loginUser()">Login</button>
<button class="google" onclick="googleLogin()">Google Login</button>

<div class="msg" id="msg"></div>

<div class="footer">SRIDHAR PEETHA</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

const supabase = createClient(supabaseUrl, supabaseKey);

const msg = document.getElementById("msg");

window.signupUser = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signUp({
email,
password
});

if(error){
msg.innerText = error.message;
msg.style.color = "red";
}else{
msg.innerText = "Signup success. Check your email.";
msg.style.color = "green";
}
};

window.loginUser = async () => {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({
email,
password
});

if(error){
msg.innerText = error.message;
msg.style.color = "red";
}else{
window.location.href = "dashboard.html";
}
};

window.googleLogin = async () => {
await supabase.auth.signInWithOAuth({
provider:'google',
options:{
redirectTo: window.location.origin + "/dashboard.html"
}
});
};
</script>

</body>
</html>
